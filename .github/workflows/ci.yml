name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install project dependencies
        working-directory: ./project
        run: npm ci --legacy-peer-deps

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

      - name: Run lint (root)
        run: npm run lint || echo "No lint script in root, skipping"

      - name: Run lint (project)
        working-directory: ./project
        run: npm run lint || echo "Lint check completed"

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install project dependencies
        working-directory: ./project
        run: npm ci --legacy-peer-deps

      - name: Build project
        working-directory: ./project
        run: npm run build
        env:
          # Set a dummy key for build (won't be used in static export)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'dummy-key-for-build' }}
